# Agent file mappings
# Format: source_path target_path
#
# source_path: relative to this repo's agents/ directory
# target_path: relative to Kubeflow Notebooks root

# Root-level files
AGENTS.md                           AGENTS.md
CLAUDE.md                           CLAUDE.md

# Backend module
backend/AGENTS.md                   workspaces/backend/AGENTS.md
backend/AGENTS-PATTERNS.md          workspaces/backend/AGENTS-PATTERNS.md

# Controller module
controller/AGENTS.md                workspaces/controller/AGENTS.md
controller/AGENTS-PATTERNS.md       workspaces/controller/AGENTS-PATTERNS.md

# Frontend module
frontend/AGENTS.md                  workspaces/frontend/AGENTS.md
frontend/AGENTS-PATTERNS.md         workspaces/frontend/AGENTS-PATTERNS.md

# Cypress E2E tests (inside frontend)
frontend/cypress/AGENTS.md          workspaces/frontend/src/__tests__/cypress/AGENTS.md
frontend/cypress/AGENTS-PATTERNS.md workspaces/frontend/src/__tests__/cypress/AGENTS-PATTERNS.md
